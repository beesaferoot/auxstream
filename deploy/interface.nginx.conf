# In-container nginx for the interface service: serves the SPA and proxies the API to
# the `api` service over the compose network. This is the web entry point — the host
# nginx (TLS/certbot) reverse-proxies to this container's published port.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API → api service. proxy_pass without a URI part forwards the full original
    # path (/api/v1/...), so no rewrite is needed. `api` resolves via Docker DNS;
    # the service is up first (compose depends_on: api healthy).
    location /api/ {
        proxy_pass http://api:5009;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;    # matches the API's MAX_REQUEST_BYTES (bulk upload)
    }

    # Health passthrough (registered at the API root, not under /api/v1).
    location = /health {
        proxy_pass http://api:5009/health;
        access_log off;
    }
}

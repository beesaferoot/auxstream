# Reference host nginx config — copied to /etc/nginx/sites-available/auxstream on the VPS.
# certbot --nginx rewrites this in place to add the listen 443 / redirect blocks.
#
# Host nginx is a thin TLS edge: it forwards everything to the `interface` container,
# which serves the SPA and proxies /api + /health to the api service. Single upstream.

server {
    server_name YOUR_DOMAIN;

    location / {
        proxy_pass http://127.0.0.1:8080;          # the interface container
        include proxy_params;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 50m;                  # matches the API's MAX_REQUEST_BYTES
    }

    # /health flows through (interface -> api). /metrics is intentionally NOT proxied —
    # scrape it on the box loopback (127.0.0.1:5009/metrics), never publicly.

    listen 443 ssl;   # managed by Certbot
}

server {
    if ($host = YOUR_DOMAIN) { return 301 https://$host$request_uri; }   # managed by Certbot
    server_name YOUR_DOMAIN;
    listen 80;
    return 404;   # managed by Certbot
}

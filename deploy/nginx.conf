# Reference host nginx config — copied to /etc/nginx/sites-available/auxstream on the VPS.
# certbot --nginx rewrites this in place to add the listen 443 / redirect blocks.

limit_req_zone $binary_remote_addr zone=auxstream_limit:10m rate=10r/s;

server {
    server_name YOUR_DOMAIN;

    root /opt/auxstream/interface/dist;   # SPA built by CI / make deploy-frontend
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Larger body cap for bulk upload (app also caps at MAX_REQUEST_BYTES = 100 MiB).
    location ^~ /api/v1/upload_batch_track {
        client_max_body_size 100m;
        proxy_pass http://127.0.0.1:5009;
        include proxy_params;
        proxy_set_header X-Real-IP $remote_addr;       # real client IP for rate limiting
        limit_req zone=auxstream_limit burst=20 nodelay;
        limit_req_status 429;
    }

    location /api {
        proxy_pass http://127.0.0.1:5009;
        include proxy_params;
        proxy_set_header X-Real-IP $remote_addr;
        limit_req zone=auxstream_limit burst=20 nodelay;
        limit_req_status 429;
    }

    # Audio is served by Cloudinary's CDN (track.File is a res.cloudinary.com URL),
    # so there is no /uploads location here.

    # Health — safe to expose (no secrets); used by smoke tests / uptime monitors.
    # The container healthcheck does NOT use this; it hits the loopback inside the
    # container. access_log off keeps health polls out of the logs.
    location = /health {
        proxy_pass http://127.0.0.1:5009;
        include proxy_params;
        access_log off;
    }

    # Metrics — NOT exposed publicly. Prometheus on the box scrapes the loopback
    # (127.0.0.1:5009/metrics) directly; nothing is proxied here. If you must scrape
    # remotely, add a `location = /metrics` with an `allow <ip>; deny all;` allowlist
    # instead of leaving it open. By default any /metrics request is a 404 (no SPA
    # match) — keep it that way.

    client_max_body_size 50m;
    listen 443 ssl;   # managed by Certbot
}

server {
    if ($host = YOUR_DOMAIN) { return 301 https://$host$request_uri; }   # managed by Certbot
    server_name YOUR_DOMAIN;
    listen 80;
    return 404;   # managed by Certbot
}

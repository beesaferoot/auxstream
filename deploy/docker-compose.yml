name: auxstream

services:
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    mem_limit: 256m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auxstream}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-auxstreamdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auxstream} -d ${POSTGRES_DB:-auxstreamdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 192m
    # Cache only — disable persistence so no volume is needed and restarts are clean.
    # maxmemory makes redis evict (LRU) before it hits the container limit and is OOM-killed.
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "144mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # One-shot: initialise (idempotent) and apply migrations, then exit. The api/worker
  # wait for this to complete successfully before starting.
  migrate:
    image: ${IMAGE:-auxstream:local}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["sh", "-c", "./migration init || true; ./migration up"]
    mem_limit: 128m
    volumes:
      - ./app.env:/app/app.env:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: ${IMAGE:-auxstream:local}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["./auxstream"]
    restart: unless-stopped
    mem_limit: 320m   # headroom for the in-memory upload buffer (MAX_REQUEST_BYTES)
    volumes:
      - ./app.env:/app/app.env:ro
    ports:
      # Loopback only — host nginx reverse-proxies to it. Never public.
      - "${HTTP_BIND:-127.0.0.1}:5009:5009"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5009/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    image: ${IMAGE:-auxstream:local}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["./index_worker", "-interval", "24"]
    restart: unless-stopped
    mem_limit: 96m
    volumes:
      - ./app.env:/app/app.env:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # Web tier: `vite preview` serving the built SPA and proxying /api + /health to
  # `api`. This is the entry point; the host nginx (TLS) reverse-proxies to its
  # published port.
  interface:
    image: ${WEB_IMAGE:-auxstream-interface:local}
    build:
      context: ..
      dockerfile: deploy/interface.Dockerfile
      args:
        VITE_BASE_URL: ${VITE_BASE_URL:-/api/v1}
    restart: unless-stopped
    mem_limit: 128m   # Node preview process; heavier than the old static nginx
    environment:
      VITE_API_PROXY: http://api:5009
    ports:
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:

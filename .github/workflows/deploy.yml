name: build-and-push
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest      # native amd64 — matches the VPS, no QEMU
    permissions:
      contents: read
      packages: write           # push to GHCR
    strategy:
      matrix:
        include:
          - name: auxstream          # api/worker/migrate (one image, many commands)
            dockerfile: deploy/Dockerfile
          - name: auxstream-interface   # frontend (SPA + nginx)
            dockerfile: deploy/interface.Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # built-in; no PAT needed to push
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

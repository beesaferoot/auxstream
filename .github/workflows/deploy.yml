name: build-and-push
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest      # native amd64 — matches the VPS, no QEMU
    permissions:
      contents: read
      packages: write           # push to GHCR
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # built-in; no PAT needed to push
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/auxstream:latest
            ghcr.io/${{ github.repository_owner }}/auxstream:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
